version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend.Dockerfile
    container_name: eval-ai-backend
    ports:
      - "8000:8000"
    environment:
      # Required for LLM feedback, resume review, and question generation:
      # - GEMINI_API_KEY=your_key_here
      - ENVIRONMENT=production
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend.Dockerfile
      args:
        # Same-origin /api/* calls are proxied to the backend by NGINX
        VITE_API_BASE_URL: ""
    container_name: eval-ai-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
